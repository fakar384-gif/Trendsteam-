        body {

            background-color: #121212; /* ডার্ক ব্যাকগ্রাউন্ড */

            padding: 15px;

        .header-title {
            text-align: center;

            margin-bottom: 25px;

        /* প্রশ্নোত্তর বক্সের ডিজাইন (Dark) */

            margin: 0 auto;
        }
        .qa-box {
            background: #1e1e1e; /* বক্সের গাঢ় ব্যাকগ্রাউন্ড */
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-left: 5px solid #64b5f6; /* বাঁ পাশে হালকা নীল বর্ডার */
        }
        
        /* প্রশ্নের ডিজাইন */
        .question {
            font-size: 18px;
            font-weight: bold;
            color: #ffb74d; /* ডার্ক থিমে পড়ার সুবিধার জন্য উজ্জ্বল কমলা */
            margin-bottom: 12px;
        }
        
        /* উত্তরের ডিজাইন */
        .answer {
            font-size: 16px;
            line-height: 1.6;
            color: #cccccc; /* চোখের আরামের জন্য হালকা ছাই রঙ */

        /* উত্তর শেষের ডিজাইন (End Mark) */

            color: #64b5f6; /* স্টারগুলোর রঙ */

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Read the latest Daily World News on TrendStream.">
   <meta name="keywords"
   content="daily world news, breaking news today, live IPL updates, cricket news live, top sports news, global tech news, BBC world news live, TrendStream news, today's top headlines.">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Daily World News - TrendStream</title>
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* General Styles */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* News Banner Styles */
        .news-banner {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .news-banner h1 {
            font-size: 36px;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.6);
        }

        .news-banner p {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            opacity: 0.9;
        }

        /* News Grid System */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        /* News Card */
        .news-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border-bottom: 4px solid #ff3b30;
        }

        .news-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(255, 59, 48, 0.3);
        }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #2a2a2a;
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .news-desc {
            font-size: 15px;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .read-more {
            display: inline-block;
            background-color: #ff3b30;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        .read-more:hover {
            background-color: #d32f2f;
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            font-size: 20px;
            color: #ff3b30;
            font-weight: bold;
            padding: 50px;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="top-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #121212;">
            <div class="brand-area" style="display: flex; align-items: center;">
                <button id="hamburgerBtn" style="background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; margin-right: 15px;">☰</button>
                <a href="index.html" style="text-decoration: none;"><div class="logo" style="font-size: 26px; font-weight: 900; color: #fff; text-transform: uppercase;">Trend<span style="color: #ff3b30;">Stream</span></div></a>
            </div>
            <a href="index.html" style="color: #fff; text-decoration: none; font-weight: bold; background-color: #ff3b30; padding: 8px 15px; border-radius: 5px;">⬅ Home</a>
        </div>
    </header>

    <main class="content-area" style="max-width: 1200px; margin: auto; padding: 20px;">
        
        <div class="news-banner">
            <h1>🌍 Daily World News</h1>
            <p>Stay updated with the latest headlines from around the globe</p>
        </div>

        <div class="news-grid" id="newsGrid">
            <div class="loading">Loading latest news... Please wait ⏳</div>
        </div>

    </main>

    <script>
        // We are using BBC World News RSS feed converted to JSON format
        const rssUrl = 'http://feeds.bbci.co.uk/news/world/rss.xml';
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

        // Fetching data from the internet
        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const newsContainer = document.getElementById('newsGrid');
                let newsHTML = '';

                // Check if news items exist
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        // Sometimes news doesn't have an image, so we use a default placeholder image
                        let imageUrl = item.thumbnail || 'https://via.placeholder.com/300x200/1e1e1e/ff3b30?text=TrendStream+News';
                        
                        // Limit description length so cards look equal
                        let shortDesc = item.description.replace(/<[^>]+>/g, '').substring(0, 120) + '...';

                        // Create HTML for each news card
                        newsHTML += `
                            <div class="news-card">
                                <img src="${imageUrl}" alt="News Image" class="news-image">
                                <div class="news-content">
                                    <h3 class="news-title">${item.title}</h3>
                                    <p class="news-desc">${shortDesc}</p>
                                    <a href="${item.link}" target="_blank" class="read-more">Read Full Story ➞</a>
                                </div>
                            </div>
                        `;
                    });
                    // Insert the generated HTML into the page
                    newsContainer.innerHTML = newsHTML;
                } else {
                    newsContainer.innerHTML = '<div class="loading">No news found today!</div>';
                }
            })
            .catch(error => {
                console.error('Error fetching news:', error);
                document.getElementById('newsGrid').innerHTML = '<div class="loading">⚠️ Error loading news. Please check your internet connection.</div>';
            });
    </script>
</body>
</html>
